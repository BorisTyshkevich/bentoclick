services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: bentoclick-ch-test
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DB: default
    volumes:
      # Mount the test cluster config (embedded Keeper + macros +
      # one-node `test_cluster` remote_server) so the schema's
      # ON CLUSTER '{cluster}' and Replicated* engines resolve.
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/test-cluster.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    tmpfs:
      # /var/lib/clickhouse is wiped per run BUT must exist for both
      # the data store and the embedded Keeper log/snapshot paths
      # (see clickhouse-config.xml keeper_server.{log,snapshot}_storage_path).
      - /var/lib/clickhouse
      - /var/log/clickhouse-server

networks:
  default:
    # Two-mode config controlled by env:
    #   - In the macOS sandbox we MUST attach to the existing isolator
    #     network (e.g. `iso-acm`) — Docker is restricted to that one
    #     network. Set DOCKER_NETWORK=iso-acm + DOCKER_NETWORK_EXTERNAL=true.
    #   - In CI (and any other plain Docker host) both env vars are
    #     unset; compose creates its own `bentoclick-test` bridge.
    # Earlier we tried `external: true name: ${DOCKER_NETWORK:-bridge}`
    # — fine in the sandbox, broken in CI because the `bridge` fallback
    # is Docker's built-in network and rejects container aliases.
    name: ${DOCKER_NETWORK:-bentoclick-test}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
