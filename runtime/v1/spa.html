<!DOCTYPE html>
<!--
  dash — SPA shell for /app and /v/<owner>/<slug>.

  Served from ClickHouse user_files as file://dash/spa.html by the handler in
  handlers/dash_handlers.xml. The shell is public; it contains no dashboard
  content.

  Dashboard content is fetched from this shell by calling ClickHouse HTTPS
  directly (`<ch_url>/?query=…`) with the viewer's Bearer token. No
  anonymous access to any dashboard row.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="cache-control" content="no-store">
<title>Dashboards</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231a1a2e'/><path d='M16 44 V22 h5 v22z M27 44 V30 h5 v14z M38 44 V16 h5 v28z M49 44 V24 h5 v20z' fill='%2300d4aa'/></svg>">
<style>
  html,body{margin:0;padding:0;height:100%;font-family:system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0}
  #status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;max-width:80%}
  #status h2{color:#00d4aa;margin:0 0 8px}
  #status .err{color:#ff6b6b;white-space:pre-wrap;text-align:left;font-family:ui-monospace,Menlo,monospace;font-size:12px}
  #actions{margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  #actions a{color:#00d4aa;text-decoration:none;padding:6px 14px;border:1px solid #00d4aa;border-radius:4px;cursor:pointer;font-size:13px}
  #actions a:hover{background:#00d4aa;color:#1a1a2e}
  iframe{border:0;width:100%;height:100%;display:block}
  .hide{display:none}

  /* ----- /app index (top-level page, no iframe) ----- */
  #app-root{min-height:100%}
  .app-header{display:flex;align-items:center;gap:14px;height:44px;padding:0 14px;border-bottom:1px solid #2a2a3e;background:#16162a;position:sticky;top:0;z-index:10}
  .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;background:linear-gradient(135deg,#00d4aa,#0099ff);color:#1a1a2e;font-weight:700;font-size:13px}
  .logo-name{font-weight:600;font-size:14px;color:#e0e0e0}
  .env-chip{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#9aa;background:#1f1f33;padding:2px 8px;border-radius:3px;border:1px solid #2a2a3e}
  .spacer{flex:1}
  .user-email{font-size:13px;color:#00d4aa;font-weight:600;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hd-btn{background:transparent;border:1px solid #2a2a3e;color:#bbb;padding:4px 10px;border-radius:4px;cursor:pointer;font:inherit;font-size:12px}
  .hd-btn:hover{border-color:#00d4aa;color:#00d4aa}

  .app-main{padding:24px 14px;max-width:1400px;margin:0 auto}
  .app-main h1{margin:0 0 16px;font-size:22px;font-weight:600}
  .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input{width:300px;background:#1f1f33;border:1px solid #2a2a3e;color:#e0e0e0;padding:6px 10px;border-radius:4px;font:inherit;font-size:13px}
  .muted{color:#9aa;font-size:12px}

  .dash-list{width:100%;border-collapse:collapse;font-size:13px}
  .dash-list th{text-align:left;padding:8px 10px;font-weight:600;color:#9aa;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #2a2a3e}
  .dash-list td{padding:10px;border-bottom:1px solid #232337;vertical-align:top}
  .dash-list .right{text-align:right;font-variant-numeric:tabular-nums}
  .dash-list td.title a{color:#00d4aa;text-decoration:none;font-weight:600}
  .dash-list td.title a:hover{text-decoration:underline}
  .dash-list td.slug{font-family:ui-monospace,Menlo,monospace;color:#9aa;font-size:12px}
  .dash-list .empty{padding:40px 0;text-align:center;color:#9aa}
  .tag{display:inline-block;background:#1f1f33;color:#9aa;padding:1px 7px;border-radius:8px;font-size:11px;margin-right:4px}

  /* Login card (signed-out state on /app) */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box}
  .login-card{background:#16162a;border:1px solid #2a2a3e;border-radius:8px;padding:32px;width:380px;max-width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  .login-logo{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#00d4aa,#0099ff);color:#1a1a2e;font-weight:700;font-size:24px;margin-bottom:12px}
  .login-card h2{margin:0 0 8px;font-size:18px;font-weight:600}
  .login-card p{margin:0 0 16px}
  .btn-primary{display:block;width:100%;background:#00d4aa;color:#1a1a2e;border:0;padding:10px;border-radius:4px;cursor:pointer;font:inherit;font-weight:600;font-size:14px}
  .btn-primary:hover{background:#00b890}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div id="status"><h2>Loading…</h2><p id="msg">Checking session…</p><div id="actions" class="hide"></div></div>
<iframe id="frame" class="hide" title="Dashboard" sandbox="allow-scripts allow-popups allow-popups-to-escape-sandbox allow-forms"></iframe>
<script type="module" src="/lib/v1/spa.js?v=1"></script>
</body>
</html>
